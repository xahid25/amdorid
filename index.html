<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { position: absolute; top: 0; left: 0; }
    #magic-point {
      width: 50px; height: 50px; background: cyan;
      border-radius: 50%; position: absolute;
      box-shadow: 0 0 20px cyan; pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="webcam" style="display:none;"></video>
  <div id="magic-point"></div>

  <script>
    const video = document.getElementById('webcam');
    const point = document.getElementById('magic-point');

    function onResults(results) {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        // Index Finger Tip is landmark 8
        const indexFinger = results.multiHandLandmarks[0][8];
        
        // Map coordinates to screen size
        const x = (1 - indexFinger.x) * window.innerWidth;
        const y = indexFinger.y * window.innerHeight;

        point.style.left = `${x}px`;
        point.style.top = `${y}px`;
      }
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({image: video}); },
      width: 1280, height: 720
    });
    camera.start();
  </script>
</body>
</html>

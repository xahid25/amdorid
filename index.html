<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Gesture Particles</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07071a;overflow:hidden;height:100vh;font-family:sans-serif;color:#eee}
#canvas{position:fixed;inset:0;width:100%;height:100%}
#camBox{position:fixed;bottom:12px;right:12px;width:140px;height:105px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);background:#000;z-index:5}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block}
#lc{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1)}
#hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.08);border-radius:999px;padding:5px 14px;font-size:12px;color:rgba(255,255,255,0.55);z-index:10;backdrop-filter:blur(6px)}
#dot{width:6px;height:6px;border-radius:50%;background:#444;flex-shrink:0;transition:background .3s}
#dot.on{background:#7fffc4;box-shadow:0 0 5px #7fffc4}
#dot.seek{background:#f90}
#gbadge{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.08);border-radius:999px;padding:5px 14px;font-size:12px;color:#7fffc4;z-index:10;display:none}
#ov{position:fixed;inset:0;background:rgba(7,7,26,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:10px}
.oi{font-size:52px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ot{font-size:20px;font-weight:600;color:#fff}
.os{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;max-width:280px;line-height:1.6;margin-bottom:8px}
#sb{padding:11px 30px;background:transparent;color:#7fffc4;border:1px solid #7fffc4;border-radius:7px;font-size:14px;cursor:pointer;transition:background .2s,transform .15s}
#sb:hover{background:rgba(127,255,196,0.1);transform:scale(1.03)}
.gg{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.gc{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;min-width:86px}
.ge{font-size:22px}
.gm{font-size:12px;color:#7fffc4;font-weight:600}
.gl{font-size:11px;color:rgba(255,255,255,0.4);text-align:center}
#em{display:none;color:#ff5555;font-size:12px;margin-top:8px;text-align:center}
#fps{position:fixed;bottom:12px;left:12px;font-size:10px;color:rgba(255,255,255,0.18);z-index:5}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="camBox">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="lc"></canvas>
</div>

<div id="hud"><div id="dot"></div><span id="sl">লোড হচ্ছে...</span></div>
<div id="gbadge"></div>
<div id="fps"></div>

<div id="ov">
  <div class="oi">✋</div>
  <p class="ot">হাত দিয়ে কন্ট্রোল করুন</p>
  <p class="os">ক্যামেরা অন করুন, তারপর হাতের ইশারায় পার্টিকেল কন্ট্রোল করুন</p>
  <button id="sb">📷 ক্যামেরা চালু করুন</button>
  <div class="gg">
    <div class="gc"><span class="ge">✊</span><span class="gm">বিস্ফোরণ</span><span class="gl">মুষ্টি বন্ধ</span></div>
    <div class="gc"><span class="ge">☝️</span><span class="gm">আকর্ষণ</span><span class="gl">১–২ আঙুল</span></div>
    <div class="gc"><span class="ge">✋</span><span class="gm">ঘূর্ণন</span><span class="gl">খোলা হাত</span></div>
  </div>
  <p id="em"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const lc     = document.getElementById('lc');
const lCtx   = lc.getContext('2d');
const video  = document.getElementById('video');
const ov     = document.getElementById('ov');
const sb     = document.getElementById('sb');
const dot    = document.getElementById('dot');
const sl     = document.getElementById('sl');
const gbadge = document.getElementById('gbadge');
const fpsEl  = document.getElementById('fps');
const em     = document.getElementById('em');

let W = 0, H = 0;

// Adaptive quality based on device capability
const cores = navigator.hardwareConcurrency || 2;
const small = window.innerWidth <= 480;
let PARTICLE_COUNT = small ? 100 : (cores <= 4 ? 130 : 200);
let skipFrames     = cores <= 2 ? 3 : (cores <= 4 ? 2 : 1);

let handX = -1, handY = -1;
let smoothHX = -1, smoothHY = -1;
let gestureMode = 'none';
let t = 0, cursorPulse = 0;

// FPS tracking
let fps = 0, lastFpsTime = performance.now(), fpsFrames = 0;
let lastTime = 0;

// Typed arrays for particles (fast iteration, cache-friendly)
const px  = new Float32Array(PARTICLE_COUNT);
const py  = new Float32Array(PARTICLE_COUNT);
const pvx = new Float32Array(PARTICLE_COUNT);
const pvy = new Float32Array(PARTICLE_COUNT);
const ph  = new Float32Array(PARTICLE_COUNT);
const psz = new Float32Array(PARTICLE_COUNT);
const pph = new Float32Array(PARTICLE_COUNT);
const por = new Float32Array(PARTICLE_COUNT);
const poa = new Float32Array(PARTICLE_COUNT);
const pos = new Float32Array(PARTICLE_COUNT);

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  lc.width  = 140;
  lc.height = 105;
}
resize();
window.addEventListener('resize', resize);

function initParticles() {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    px[i]  = Math.random() * W;
    py[i]  = Math.random() * H;
    pvx[i] = (Math.random() - 0.5) * 0.8;
    pvy[i] = (Math.random() - 0.5) * 0.8;
    ph[i]  = 100 + Math.random() * 80;
    psz[i] = Math.random() * 2 + 0.8;
    pph[i] = Math.random() * 6.28;
    por[i] = 60 + Math.random() * Math.min(W, H) * 0.22;
    poa[i] = Math.random() * 6.28;
    pos[i] = (Math.random() - 0.5) * 0.025;
  }
}
initParticles();

// Smooth hand lerp for fluid motion
function lerpHand() {
  if (handX < 0) return;
  if (smoothHX < 0) { smoothHX = handX; smoothHY = handY; return; }
  const s = 0.14;
  smoothHX += (handX - smoothHX) * s;
  smoothHY += (handY - smoothHY) * s;
}

function updateParticles() {
  const hx = smoothHX * W;
  const hy = smoothHY * H;
  const hasHand = smoothHX >= 0;

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    let x = px[i], y = py[i], vx = pvx[i], vy = pvy[i];

    if (hasHand && gestureMode === 'explode') {
      const dx = x - hx, dy = y - hy;
      const d2 = dx*dx + dy*dy + 1;
      const d  = Math.sqrt(d2);
      const f  = Math.min(400 / d2, 7);
      vx += (dx / d) * f;
      vy += (dy / d) * f;
      vx *= 0.91; vy *= 0.91;

    } else if (hasHand && gestureMode === 'attract') {
      const dx = hx - x, dy = hy - y;
      const d  = Math.sqrt(dx*dx + dy*dy) + 1;
      const f  = Math.min(280 / d, 4.5);
      vx += (dx / d) * f * 0.11;
      vy += (dy / d) * f * 0.11;
      vx *= 0.89; vy *= 0.89;

    } else if (hasHand && gestureMode === 'spiral') {
      poa[i] += pos[i] + 0.009;
      const tx = hx + Math.cos(poa[i]) * por[i];
      const ty = hy + Math.sin(poa[i]) * por[i];
      vx += (tx - x) * 0.038;
      vy += (ty - y) * 0.038;
      vx *= 0.87; vy *= 0.87;

    } else {
      vx += (Math.random() - 0.5) * 0.04;
      vy += (Math.random() - 0.5) * 0.04;
      vx *= 0.985; vy *= 0.985;
    }

    x += vx; y += vy;
    if (x < -50) x = W + 40;
    else if (x > W + 50) x = -40;
    if (y < -50) y = H + 40;
    else if (y > H + 50) y = -40;

    px[i] = x; py[i] = y; pvx[i] = vx; pvy[i] = vy;
    pph[i] += 0.025;
  }
}

function drawParticles() {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const a = 0.35 + 0.3 * Math.sin(pph[i]);
    ctx.beginPath();
    ctx.arc(px[i], py[i], psz[i], 0, 6.2832);
    ctx.fillStyle = `hsla(${ph[i]|0},82%,65%,${a})`;
    ctx.fill();
  }
}

function drawLines() {
  if (smoothHX < 0) return;
  const hx = smoothHX * W, hy = smoothHY * H;
  const THRESH = 110, T2 = THRESH * THRESH;
  ctx.lineWidth = 0.5;
  for (let i = 0; i < PARTICLE_COUNT; i += 3) {
    const dx = px[i] - hx, dy = py[i] - hy;
    const d2 = dx*dx + dy*dy;
    if (d2 < T2) {
      const a = (1 - Math.sqrt(d2) / THRESH) * 0.28;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(px[i], py[i]);
      ctx.strokeStyle = `hsla(${ph[i]|0},78%,62%,${a})`;
      ctx.stroke();
    }
  }
}

function drawCursor() {
  if (smoothHX < 0) return;
  cursorPulse += 0.06;
  const cx = smoothHX * W, cy = smoothHY * H;
  const r  = 14 + 3 * Math.sin(cursorPulse);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 6.2832);
  ctx.strokeStyle = 'rgba(127,255,196,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, 3.5, 0, 6.2832);
  ctx.fillStyle = 'rgba(127,255,196,0.85)';
  ctx.fill();
}

function loop(now) {
  requestAnimationFrame(loop);
  const dt = now - lastTime;
  if (dt < 14) return; // ~60fps cap, avoids over-rendering
  lastTime = now;

  fpsFrames++;
  if (now - lastFpsTime > 1000) {
    fps = fpsFrames; fpsFrames = 0; lastFpsTime = now;
    fpsEl.textContent = fps + ' fps | ' + PARTICLE_COUNT + ' particles';
  }

  t += 0.01;
  lerpHand();

  // Soft trail fade
  ctx.fillStyle = 'rgba(7,7,26,0.17)';
  ctx.fillRect(0, 0, W, H);

  updateParticles();
  drawParticles();
  drawLines();
  drawCursor();
}
requestAnimationFrame(loop);

/* ── Gesture detection ── */
function detectGesture(lm) {
  const up = (tip, mcp) => tip.y < mcp.y - 0.03;
  let c = 0;
  if (up(lm[8],  lm[5]))  c++;
  if (up(lm[12], lm[9]))  c++;
  if (up(lm[16], lm[13])) c++;
  if (up(lm[20], lm[17])) c++;
  if (c === 0) return 'explode';
  if (c >= 3)  return 'spiral';
  return 'attract';
}

const gLabels = { explode:'✊ বিস্ফোরণ', attract:'☝️ আকর্ষণ', spiral:'✋ ঘূর্ণন' };

/* ── Skeleton ── */
const CONN = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
              [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
              [0,17],[17,18],[18,19],[19,20]];

function drawSkeleton(lm) {
  lCtx.clearRect(0, 0, 140, 105);
  lCtx.strokeStyle = 'rgba(127,255,196,0.45)';
  lCtx.lineWidth = 1.2;
  for (const [a, b] of CONN) {
    lCtx.beginPath();
    lCtx.moveTo((1 - lm[a].x) * 140, lm[a].y * 105);
    lCtx.lineTo((1 - lm[b].x) * 140, lm[b].y * 105);
    lCtx.stroke();
  }
  lCtx.fillStyle = 'rgba(127,255,196,0.85)';
  for (const p of lm) {
    lCtx.beginPath();
    lCtx.arc((1 - p.x) * 140, p.y * 105, 2.5, 0, 6.2832);
    lCtx.fill();
  }
}

/* ── Start ── */
sb.addEventListener('click', async () => {
  sb.disabled = true;
  sb.textContent = 'অপেক্ষা করুন...';
  sl.textContent = 'ক্যামেরা চালু হচ্ছে...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });

    ov.style.display = 'none';
    dot.className = 'seek';
    sl.textContent = 'হাত দেখান...';

    const hands = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({
      maxNumHands:            1,
      modelComplexity:        0,
      minDetectionConfidence: 0.6,
      minTrackingConfidence:  0.5
    });

    hands.onResults(results => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const lm = results.multiHandLandmarks[0];
        handX = 1 - lm[0].x;
        handY = lm[0].y;
        gestureMode = detectGesture(lm);
        gbadge.style.display = 'block';
        gbadge.textContent   = gLabels[gestureMode] || '';
        drawSkeleton(lm);
        dot.className  = 'on';
        sl.textContent = 'হাত শনাক্ত ✓';
      } else {
        lCtx.clearRect(0, 0, 140, 105);
        handX = handY = -1;
        smoothHX = smoothHY = -1;
        gestureMode = 'none';
        gbadge.style.display = 'none';
        dot.className  = 'seek';
        sl.textContent = 'হাত দেখান...';
      }
    });

    let camFrame = 0;
    const cam = new Camera(video, {
      onFrame: async () => {
        camFrame++;
        if (camFrame % skipFrames === 0) {
          await hands.send({ image: video });
        }
      },
      width: 320, height: 240
    });
    cam.start();

  } catch (e) {
    em.style.display  = 'block';
    em.textContent    = '⚠️ ক্যামেরা পারমিশন দিন এবং আবার চেষ্টা করুন।';
    sb.disabled       = false;
    sb.textContent    = '📷 আবার চেষ্টা করুন';
    sl.textContent    = 'এরর';
    console.error(e);
  }
});
</script>
</body>
</html>
